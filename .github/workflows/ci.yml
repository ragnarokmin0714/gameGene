name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Quality gate on Linux: formatting, lints, and the full test suite.
  # This matches what is verified during development, so it should stay green.
  quality:
    name: fmt + clippy + test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install GUI build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libxkbcommon-dev libwayland-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  # Confirms the Windows backend (windows.rs) actually compiles and the core
  # tests pass on the shipping target. This is the real check for code that the
  # Linux job cannot exercise.
  build-windows:
    name: build + test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace
      - run: cargo test --workspace
